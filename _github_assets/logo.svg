<svg viewBox="0 0 582 410" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				.light { display: block; }
				.dark { display: none; }
				@media (prefers-color-scheme: dark) {
					.light { display: none; }
					.dark { display: block; }
				}
			</style>

			<img class="dark" src="https://raw.githubusercontent.com/tothpeter/local_sherpa/main/_github_assets/logo_light.png" />
			<img class="light" src="https://raw.githubusercontent.com/tothpeter/local_sherpa/main/_github_assets/logo_dark.png" />
		</div>
	</foreignObject>
</svg>
